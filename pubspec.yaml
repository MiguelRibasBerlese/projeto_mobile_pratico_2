name: cine_track
description: "Diário de filmes com Firebase e API OMDb"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  uuid: ^4.3.3
  intl: ^0.19.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  http: ^1.2.2
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

# Overrides: fixam as implementações de path_provider em versões anteriores às
# que adotaram "native assets" (jni/objective_c). Essas implementações são de
# Android/iOS e não são usadas no build Web — mas o hook nativo do objective_c
# é incompatível com este SDK e quebrava o `flutter build web`. Como o deploy é
# Web, fixá-las resolve o build sem alterar as versões do Firebase.
dependency_overrides:
  path_provider_android: 2.2.17
  path_provider_foundation: 2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
